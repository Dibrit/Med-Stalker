<div class="toast-stack" aria-live="polite" aria-relevant="additions">
  <div
    class="toast"
    *ngFor="let t of (toastSvc.toasts$ | async) ?? []"
    [class.toast--success]="t.kind === 'success'"
    [class.toast--error]="t.kind === 'error'"
    [class.toast--warning]="t.kind === 'warning'"
    [class.toast--info]="t.kind === 'info'"
    role="status"
  >
    <div class="toast__body">
      <div class="toast__title" *ngIf="t.title">{{ t.title }}</div>
      <div class="toast__msg">{{ t.message }}</div>
    </div>
    <button class="toast__x" type="button" (click)="dismiss(t.id)" aria-label="Dismiss">
      ×
    </button>
  </div>
</div>
