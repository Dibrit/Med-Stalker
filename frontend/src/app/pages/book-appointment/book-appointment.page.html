<section class="page">
  <div class="page__hd">
    <div>
      <h1>Book Appointment</h1>
      <p class="sub">Schedule an appointment with a doctor by selecting a specialization and available time slot.</p>
    </div>
  </div>

  <div class="alert alert--error" *ngIf="error">{{ error }}</div>

  <div class="panel" *ngIf="loading">
    <div class="panel__bd">Loading doctors…</div>
  </div>

  <form class="appointment-form" *ngIf="!loading && !error" (ngSubmit)="bookAppointment()">
    <div class="form-group">
      <label for="specialization">Select Specialization</label>
      <select
        id="specialization"
        [(ngModel)]="selectedSpecialization"
        (change)="onSpecializationChange()"
        name="specialization"
        required
        [disabled]="submitting"
      >
        <option value="">-- Choose a specialization --</option>
        <option *ngFor="let spec of specializations" [value]="spec">{{ spec }}</option>
      </select>
    </div>

    <div class="form-group" *ngIf="filteredDoctors.length > 0">
      <label for="doctor">Select Doctor</label>
      <select
        id="doctor"
        [(ngModel)]="selectedDoctor"
        name="doctor"
        [compareWith]="compareDoctors"
        required
        [disabled]="submitting"
      >
        <option [ngValue]="null">-- Choose a doctor --</option>
        <option *ngFor="let doctor of filteredDoctors" [ngValue]="doctor">
          {{ getDoctorDisplay(doctor) }}
        </option>
      </select>
    </div>

    <div class="form-group" *ngIf="selectedDoctor">
      <label for="appointmentDate">Date</label>
      <input
        id="appointmentDate"
        type="date"
        [(ngModel)]="appointmentDate"
        name="appointmentDate"
        required
        [disabled]="submitting"
      />
    </div>

    <div class="form-group" *ngIf="selectedDoctor">
      <label for="appointmentTime">Time</label>
      <input
        id="appointmentTime"
        type="time"
        [(ngModel)]="appointmentTime"
        name="appointmentTime"
        required
        [disabled]="submitting"
      />
    </div>

    <div class="form-group">
      <label for="reason">Reason for Visit (Optional)</label>
      <textarea
        id="reason"
        [(ngModel)]="appointmentReason"
        name="reason"
        placeholder="Describe symptoms or reason for visit"
        [disabled]="submitting"
        rows="4"
      ></textarea>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        class="btn btn--primary"
        [disabled]="!selectedDoctor || !appointmentDate || !appointmentTime || submitting"
      >
        {{ submitting ? 'Booking...' : 'Book Appointment' }}
      </button>
      <a routerLink="/dashboard" class="btn btn--secondary">Cancel</a>
    </div>
  </form>
</section>
