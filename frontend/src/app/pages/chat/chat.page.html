<section class="page">
  <div class="page__hd">
    <div>
      <h1>Messages</h1>
      <p class="sub">Send and receive messages from your healthcare team.</p>
    </div>
  </div>

  <div class="alert alert--error" *ngIf="error">{{ error }}</div>

  <div class="panel" *ngIf="loading">
    <div class="panel__bd">Loading messages…</div>
  </div>

  <div class="chat-container" *ngIf="!loading && !error">
    <div class="chat__partners">
      <h2>Conversations</h2>
      <div class="partners-list">
        <button
          *ngFor="let partner of conversationPartners"
          class="partner-item"
          [class.active]="selectedPartner?.id === partner.id"
          (click)="selectedPartner = partner"
        >
          {{ getPartnerDisplay(partner) }}
        </button>
      </div>
    </div>

    <div class="chat__main">
      <div class="chat__header" *ngIf="selectedPartner">
        <h2>{{ getPartnerDisplay(selectedPartner) }}</h2>
      </div>

      <div class="chat__messages" *ngIf="selectedPartner">
        <div
          *ngFor="let message of getMessagesWithPartner()"
          class="message"
          [class.message--mine]="isMyMessage(message)"
        >
          <div class="message__body">
            <p class="message__content">{{ message.content }}</p>
            <span class="message__time">{{ message.created_at | date: 'short' }}</span>
          </div>
        </div>

        <div *ngIf="getMessagesWithPartner().length === 0" class="message-empty">
          No messages yet. Start a conversation!
        </div>
      </div>

      <div class="chat__empty" *ngIf="!selectedPartner">
        <p>Select a conversation to start messaging</p>
      </div>

      <form class="chat__input" *ngIf="selectedPartner" (ngSubmit)="sendMessage()">
        <textarea
          [(ngModel)]="messageContent"
          name="messageContent"
          placeholder="Type your message..."
          rows="3"
          [disabled]="sending"
        ></textarea>
        <button
          type="submit"
          class="btn btn--primary"
          [disabled]="!messageContent.trim() || sending"
        >
          {{ sending ? 'Sending...' : 'Send' }}
        </button>
      </form>
    </div>
  </div>
</section>
